<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список</title>
    <style>
        .styled-list {
            background-color: #ec9ba9;
            list-style-position: inside;
            list-style-type: decimal;
            padding: 15px;
            margin: 20px;
            width: 20%;
        }

        .styled-list li {
            background-color: #ca687f;
            margin-bottom: 5px;
            margin-top: 5px;
            padding-left: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 16px;
        }

        .styled-list li span {
            display: inline-block;
            background-color: #8a3951;
            padding: 5px 10px;
            color: #ffffff;
            font-family: sans-serif;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <ul class="styled-list">
        <li><span>Apple</span></li>
        <li><span>Orange</span></li>
        <li><span>Pineapple</span></li>
        <li><span>Pear</span></li>
        <li><span>Cherry</span></li>
    </ul>

</body>
</html>
