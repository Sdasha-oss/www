<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }

        .player-section {
            margin-bottom: 30px;
        }

        .hand {
            display: flex; /* Розміщує картки в один ряд */
            gap: 10px; /* Відстань між картками */
        }

        .card {
            width: 65px; /* Зменшений розмір відповідно до прикладу */
            height: 50px;
            background-color: #c7c7c7;
            
            /* Центрування вмісту */
            display: flex; 
            justify-content: center;
            align-items: center;
            
            font-size: 30px; 
            font-weight: bold;
        }

        .red {
            color: #af0606; /* Темно-червоний колір */
        }

        .black {
            color: #000000;
        }

        .rank-suit {
            /* Контейнер для рангу і масті, щоб вони були поруч */
            display: flex;
            align-items: center;
            gap: 2px; /* Невелика відстань між рангом та мастю */
        }

        .suit {
            font-size: 40px; /* Розмір символу масті */
            line-height: 2; /* Для кращого вертикального вирівнювання */
        }
    </style>
</head>
<body>

    <div class="player-section">
        <h2>Player 1:</h2>
        <div class="hand">
            <div class="card black">
                <span class="rank-suit">
                    <span>2</span>
                    <span class="suit">&#9827;</span> </span>
            </div>
            <div class="card red">
                <span class="rank-suit">
                    <span>9</span>
                    <span class="suit">&#9829;</span> </span>
            </div>
            <div class="card red">
                <span class="rank-suit">
                    <span>6</span>
                    <span class="suit">&#9829;</span> </span>
            </div>
            <div class="card red">
                <span class="rank-suit">
                    <span>A</span>
                    <span class="suit">&#9830;</span> </span>
            </div>
            <div class="card black">
                <span class="rank-suit">
                    <span>Q</span>
                    <span class="suit">&#9824;</span> </span>
            </div>
            <div class="card black">
                <span class="rank-suit">
                    <span>J</span>
                    <span class="suit">&#9827;</span> </span>
            </div>
        </div>
    </div>


    <div class="player-section">
        <h2>Player 2:</h2>
        <div class="hand">
            <div class="card red">
                <span class="rank-suit">
                    <span>3</span>
                    <span class="suit">&#9829;</span> </span>
            </div>
            <div class="card black">
                <span class="rank-suit">
                    <span>A</span>
                    <span class="suit">&#9827;</span> </span>
            </div>
            <div class="card black">
                <span class="rank-suit">
                    <span>10</span>
                    <span class="suit">&#9827;</span> </span>
            </div>
            <div class="card red">
                <span class="rank-suit">
                    <span>K</span>
                    <span class="suit">&#9830;</span> </span>
            </div>
            <div class="card black">
                <span class="rank-suit">
                    <span>8</span>
                    <span class="suit">&#9824;</span> </span>
            </div>
            <div class="card red">
                <span class="rank-suit">
                    <span>3</span>
                    <span class="suit">&#9829;</span> </span>
            </div>
        </div>
    </div>

</body>
</html>
